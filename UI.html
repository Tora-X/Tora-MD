<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tora MD | Device Pairing</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #22c55e;
            --terminal-bg: #020617;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 28px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #334155;
            background-color: var(--bg-color);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .code-display {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: var(--bg-color);
            border: 2px dashed var(--primary);
            border-radius: 8px;
        }

        .code-display h2 {
            font-size: 32px;
            letter-spacing: 5px;
            color: var(--text-main);
            margin: 10px 0;
        }

        .terminal {
            margin-top: 30px;
            background-color: var(--terminal-bg);
            border-radius: 8px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            border: 1px solid #334155;
        }

        .log-entry { margin-bottom: 5px; }
        .log-info { color: var(--text-muted); }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--error);
            margin-right: 5px;
        }
        .status-dot.connected { background-color: var(--success); }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐅 Tora MD Engine</h1>
        <p class="subtitle">
            <span class="status-dot" id="ws-status"></span>
            Server Status: <span id="ws-text">Disconnected</span>
        </p>

        <div class="input-group">
            <label for="phoneNumber">WhatsApp Number (with country code):</label>
            <input type="text" id="phoneNumber" placeholder="e.g. 94722633010" autocomplete="off">
        </div>

        <button id="pairBtn" onclick="requestPairing()">Generate Pairing Code</button>

        <div class="code-display" id="codeBox">
            <p style="color: var(--text-muted); font-size: 14px;">Enter this code on your phone:</p>
            <h2 id="pairingCode">----</h2>
            <p style="color: var(--error); font-size: 12px;">Do not refresh the page!</p>
        </div>

        <div class="terminal" id="terminal">
            <div class="log-entry log-info">System initialized. Waiting for connection...</div>
        </div>
    </div>

    <script>
        let ws;
        const sessionIdentifier = "tora_session"; // Static fallback identity mapping
        const terminal = document.getElementById('terminal');
        const codeBox = document.getElementById('codeBox');
        const pairingCodeText = document.getElementById('pairingCode');
        const pairBtn = document.getElementById('pairBtn');
        const phoneInput = document.getElementById('phoneNumber');
        const wsStatus = document.getElementById('ws-status');
        const wsText = document.getElementById('ws-text');

        function appendLog(message, type = 'info') {
            const el = document.createElement('div');
            el.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            el.innerText = `[${time}] ${message}`;
            terminal.appendChild(el);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                wsStatus.className = 'status-dot connected';
                wsText.innerText = 'Connected';
                wsText.style.color = 'var(--success)';
                appendLog('Connected to Tora MD backend gateway.', 'success');
                
                // Fix 1: Register session connection mapping layout with server immediately
                ws.send(JSON.stringify({
                    action: 'init',
                    sessionId: sessionIdentifier
                }));
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    // Fix 2: Handle incoming instance connection status changes
                    if (data.type === 'status') {
                        appendLog(`WhatsApp connection state: ${data.status}`, 'info');
                        if (data.status === 'CONNECTED') {
                            appendLog('Session successfully linked!', 'success');
                            pairBtn.innerText = "Linked Successfully";
                        }
                    } else if (data.type === 'error') {
                        appendLog(data.message, 'error');
                        pairBtn.disabled = false;
                        pairBtn.innerText = "Try Again";
                    } 
                    // Fix 3: Read 'code' field instead of 'message'
                    else if (data.type === 'code') {
                        codeBox.style.display = 'block';
                        pairingCodeText.innerText = data.code;
                        appendLog('Pairing code fetched successfully.', 'success');
                        pairBtn.innerText = "Code Generated";
                    }
                } catch (e) {
                    console.error("Message Parsing Error:", e);
                }
            };

            ws.onclose = () => {
                wsStatus.className = 'status-dot';
                wsText.innerText = 'Disconnected';
                wsText.style.color = 'var(--error)';
                appendLog('Connection lost. Reconnecting in 3s...', 'error');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function requestPairing() {
            const number = phoneInput.value.replace(/[^0-9]/g, '');
            if (!number) {
                appendLog('Please enter a valid phone number.', 'error');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                appendLog(`Requesting code for +${number}...`, 'info');
                
                // Fix 4: Send missing parameter keys required by backend destructuring 
                ws.send(JSON.stringify({
                    action: 'start_pairing',
                    sessionId: sessionIdentifier,
                    phoneNumber: number,
                    mode: 'pairing'
                }));
                
                pairBtn.disabled = true;
                pairBtn.innerText = "Requesting...";
                codeBox.style.display = 'none';
            } else {
                appendLog('Cannot send request. Backend disconnected.', 'error');
            }
        }

        window.onload = connectWebSocket;
    </script>
</body>
</html>
